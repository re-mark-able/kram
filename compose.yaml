services:
  kram:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    network_mode: bridge
    volumes:
      - ./db:/app/db

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=supersecretpass
      - POSTGRES_DB=kram
      - PGPORT=5132
    restart: unless-stopped
    volumes:
      - ./db:/app/postgresql/data
    network_mode: bridge
